<style>

body {

.page {

  padding: 54px 68px;

}

.kicker {

  color: #56d6c9;

  margin-bottom: 18px;
  text-transform: uppercase;
}

h1 {

  font-size: 56px;
  line-height: 1.05;
  font-weight: 500;

  margin: 0;
}

p {
  color: rgba(237,247,239,.76);
  line-height: 1.65;
  font-size: 18px;
  margin: 0;
}

.card {
  background: rgba(255,255,255,.075);
  border: 1px solid rgba(123,211,196,.18);
  box-shadow: 0 20px 55px rgba(0,0,0,.24);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: 20px;
}

.badge {

  padding: 7px 12px;
  border-radius: 999px;

  background: rgba(65,182,196,.14);

  font-size: 12px;
  letter-spacing: .12em;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  text-transform: uppercase;
}

.footer-note {

  bottom: 30px;
  left: 68px;
  color: rgba(237,247,239,.45);
  font-size: 13px;
  letter-spacing: .10em;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  z-index: 10;
}

.next-link {
  position: fixed;
  right: 54px;
  bottom: 42px;
  color: #8de9df;
  text-decoration: none;
  border: 1px solid rgba(100,216,203,.40);
  padding: 13px 20px;
  border-radius: 8px;
  font-size: 13px;
  letter-spacing: .12em;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  background: rgba(17,21,24,.72);
  z-index: 10;
}

.next-link:hover {
  background: rgba(100,216,203,.12);
}

.image-frame {
  overflow: hidden;
  border-radius: 20px;
  border: 1px solid rgba(123,211,196,.18);
  box-shadow: 0 22px 58px rgba(0,0,0,.28);
  background: rgba(255,255,255,.07);
}

.image-frame img {
  width: 100%;
  height: 100%;
  display: block;
}

.cover-img {
  object-fit: cover;
}

.contain-img {
  object-fit: contain;
  background: rgba(255,255,255,.92);
}

.timeline {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 26px;
  margin-top: 26px;
  position: relative;
}

.timeline::before {
  content: "";

  left: 8%;
  right: 8%;

  height: 3px;
  background: linear-gradient(90deg, #9bd36d, #41b6c4, #2f80ed);
  opacity: .85;
}

.time-item {
  position: relative;
  padding-top: 78px;
}

.dot {
  position: absolute;
  top: 30px;
  left: 0;
  width: 30px;
  height: 30px;
  border-radius: 999px;
  background: #56d6c9;
  box-shadow: 0 0 0 8px rgba(100,216,203,.14);
}

.year {
  font-size: 28px;
  font-weight: 800;
  color: #fff;

.phase {

.detail {
  font-size: 15px;
  color: rgba(237,247,239,.66);
  line-height: 1.55;
}

.logic-grid {
  display: grid;
  grid-template-columns: 1.1fr 1fr .8fr;
  gap: 24px;
  align-items: center;

}

.question-box {

.question {

.small-text {

.perspective {

  border: 1px solid rgba(100,216,203,.26);
  border-radius: 16px;
  font-size: 26px;
  font-weight: 800;
}

.website-box {
  padding: 30px;
  text-align: center;
}

.website-box strong {
  font-size: 34px;
  line-height: 1.2;
  display: block;
  color: #fff;
}

.website-box span {
  display: block;
  margin-top: 12px;
  color: rgba(237,247,239,.64);

@media (max-width: 1000px) {
  .page { padding: 36px; }

</style>

<style>
body.title-page {
  overflow: hidden;
}

.title-layout {
  display: grid;
  grid-template-columns: 0.92fr 1.35fr;
  gap: 42px;
  align-items: center;
  height: calc(100vh - 108px);
}

.title-copy {
  padding-right: 8px;
}

.title-copy p {
  margin-top: 26px;
  max-width: 620px;
}

.image-stack {
  display: grid;
  grid-template-columns: 0.43fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 16px;
  height: 72vh;
}

.main-map {
  grid-row: 1 / span 2;
  grid-column: 2;
  aspect-ratio: 1 / 1;
  width: min(100%, 72vh);
  height: min(72vh, 100%);
  max-height: 72vh;
  align-self: center;
  justify-self: center;
  display: block;
  cursor: grab;
  overflow: auto;
  scroll-behavior: smooth;
}

.main-map:active {
  cursor: grabbing;
}

.main-map img {
  height: 100%;
  width: auto;
  min-width: 100%;
  object-fit: contain;
  background: rgba(255,255,255,.95);
  transform-origin: center center;
  transition: transform .08s ease-out;
  user-select: none;
  -webkit-user-drag: none;
}

.main-map::-webkit-scrollbar {
  height: 9px;
  width: 9px;
}

.main-map::-webkit-scrollbar-track {
  background: rgba(255,255,255,.10);
  border-radius: 999px;
}

.main-map::-webkit-scrollbar-thumb {
  background: rgba(100,216,203,.45);
  border-radius: 999px;
}

.zoom-hint {
  position: absolute;
  top: 16px;
  right: 16px;
  padding: 8px 11px;
  background: rgba(17,21,24,.74);
  border: 1px solid rgba(100,216,203,.28);
  border-radius: 999px;
  color: rgba(237,247,239,.80);
  font-size: 11px;
  letter-spacing: .08em;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  z-index: 3;
  pointer-events: none;
}

.context-map {
  grid-column: 1;
  grid-row: 1;
}

.photo {
  grid-column: 1;
  grid-row: 2;
}

.overlay-caption {
  position: absolute;
  left: 22px;
  bottom: 18px;
  right: 22px;
  padding: 14px 16px;
  background: rgba(17,21,24,.74);
  border: 1px solid rgba(100,216,203,.24);
  border-radius: 12px;
  color: rgba(237,247,239,.82);
  font-size: 13px;
  line-height: 1.45;
}

.image-frame {
  position: relative;
}
</style>
</head>

<body class="title-page">
  <section class="page">
    <div class="title-layout">
      <div class="title-copy">
        <div class="kicker">Roosevelt Boulevard · Philadelphia</div>
        <h1> Roosevelt Boulevard Subway Proposal: Evaluation & Visualization</h1>
        <p>Evaluating the proposed subway option through sustainability, economic development, and public health</p>
        <div style="margin-top:32px;">
          <span class="badge">Qianmu Zheng</span>
          <span class="badge">Sam Sen</span>
          <span class="badge">Xiao Yu</span>
        </div>
      </div>

      <div class="image-stack">
        <div class="image-frame context-map">
          <img class="cover-img" src="images/route_context.png" alt="Roosevelt Boulevard context map">
        </div>
        <div class="image-frame photo">
          <img class="cover-img" src="images/community_photo.png" alt="Roosevelt Boulevard community context">
        </div>
        <div class="image-frame main-map" id="routeViewer">
          <img id="routeImage" src="images/roosevelt_subway_map.png" alt="Proposed Roosevelt Boulevard subway alignment">
          </div>
        </div>
      </div>
    </div>

    <div class="footer-note">00 / 05 · Project Introduction</div>
    <a class="next-link" href="00_2_total_introduction.html">NEXT →</a>
  </section>

<script>
const viewer = document.getElementById("routeViewer");
const img = document.getElementById("routeImage");

let isDragging = false;
let startX = 0;
let startY = 0;
let scrollLeft = 0;
let scrollTop = 0;

function centerRouteImage() {
  viewer.scrollLeft = Math.max(0, (img.scrollWidth - viewer.clientWidth) / 2);
  viewer.scrollTop = Math.max(0, (img.scrollHeight - viewer.clientHeight) / 2);
}

img.addEventListener("load", centerRouteImage);
window.addEventListener("resize", centerRouteImage);

viewer.addEventListener("wheel", (e) => {
  if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
    e.preventDefault();
    viewer.scrollLeft += e.deltaY;
  }
}, { passive: false });

viewer.addEventListener("mousedown", (e) => {
  isDragging = true;
  startX = e.pageX - viewer.offsetLeft;
  startY = e.pageY - viewer.offsetTop;
  scrollLeft = viewer.scrollLeft;
  scrollTop = viewer.scrollTop;
});

window.addEventListener("mousemove", (e) => {
  if (!isDragging) return;
  e.preventDefault();
  const x = e.pageX - viewer.offsetLeft;
  const y = e.pageY - viewer.offsetTop;
  viewer.scrollLeft = scrollLeft - (x - startX);
  viewer.scrollTop = scrollTop - (y - startY);
});

window.addEventListener("mouseup", () => {
  isDragging = false;
});

viewer.addEventListener("dblclick", centerRouteImage);
</script>
</body>
</html>
