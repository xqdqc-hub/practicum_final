  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d1117;color:#e6edf3;
          display:flex;flex-direction:column;height:100vh;overflow:hidden;}
    #header{background:#161b22;border-bottom:1px solid #30363d;padding:13px 20px;flex-shrink:0;}
    #header h1{font-size:15px;font-weight:600;letter-spacing:.3px;}
    #header p{font-size:11px;color:#8b949e;margin-top:3px;}
    #main{display:flex;flex:1;overflow:hidden;}
    #sidebar{width:245px;background:#161b22;border-right:1px solid #30363d;
              padding:16px;overflow-y:auto;flex-shrink:0;}
    .sec-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;
                color:#8b949e;font-weight:600;margin-bottom:10px;display:flex;
                justify-content:space-between;align-items:center;}
    .sec-label a{font-size:9px;color:#58a6ff;cursor:pointer;text-transform:none;letter-spacing:0;text-decoration:none;}
    .type-row{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:6px;
               cursor:pointer;transition:background .12s;margin-bottom:3px;}
    .type-row:hover{background:#21262d;}
    .tdot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
    .type-row label{font-size:12px;cursor:pointer;line-height:1.35;flex:1;}
    .type-row input{accent-color:#58a6ff;width:14px;height:14px;cursor:pointer;flex-shrink:0;}
    hr.div{border:none;border-top:1px solid #30363d;margin:14px 0;}
    .stat-card{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:10px 12px;margin-bottom:8px;}
    .stat-label{font-size:10px;color:#8b949e;text-transform:uppercase;letter-spacing:.8px;}
    .stat-value{font-size:20px;font-weight:700;margin-top:2px;}
    #map-wrap{flex:1;position:relative;}
    #map{width:100%;height:100%;}
    .leaflet-container{background:#0d1117;}
    #popup{position:absolute;bottom:24px;left:24px;width:280px;background:#161b22;
            border:1px solid #30363d;border-radius:10px;padding:16px;
            box-shadow:0 8px 32px rgba(0,0,0,.75);z-index:1000;display:none;animation:up .18s ease;}
    @keyframes up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    #popup.show{display:block;}
    #pcls{position:absolute;top:10px;right:12px;background:none;border:none;
           color:#8b949e;font-size:20px;cursor:pointer;line-height:1;}
    #pcls:hover{color:#e6edf3;}
    #pname{font-size:13px;font-weight:600;margin-bottom:10px;padding-right:20px;line-height:1.4;}
    .irow{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #21262d;font-size:12px;}
    .irow:last-child{border-bottom:none;}
    .ik{color:#8b949e;} .iv{color:#e6edf3;font-weight:500;}
    .legend-x{color:#ffd700;font-size:13px;font-weight:900;line-height:1;}
    .legend-station{display:flex;align-items:center;gap:8px;margin-top:6px;font-size:11px;color:#8b949e;}
    .leaflet-tooltip{background:#161b22;border:1px solid #30363d;color:#e6edf3;font-size:11px;padding:4px 8px;}
    .leaflet-tooltip-top:before{border-top-color:#30363d;}
  </style>
</head>

const COLORS = {food:'#f39c12', retail:'#58a7e6'};
const LABELS = {food:'Food / Restaurant', retail:'Retail'};

const map = L.map('map').setView([40.06, -75.08], 12);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap contributors © CARTO',
  subdomains: 'abcd', maxZoom: 19,
}).addTo(map);

// Walk sheds
for (const shed of SHEDS) {
  const coords = shed.lats.map((lat,i) => [lat, shed.lons[i]]);
  L.polygon(coords, {
    color:'rgba(88,167,230,0.5)', weight:1.5,
    fillColor:'#58a7e6', fillOpacity:0.06,
  }).bindTooltip('<b>' + shed.station + '</b><br>10-min walk shed').addTo(map);
}

// POI layer groups
const foodGroup   = L.layerGroup().addTo(map);
const retailGroup = L.layerGroup().addTo(map);

for (const p of POIS) {
  const color = COLORS[p.poi_type] || '#8b949e';
  const grp   = p.poi_type === 'food' ? foodGroup : retailGroup;
  L.circleMarker([p.lat, p.lng], {
    radius:4, fillColor:color, color:color, weight:0.5, fillOpacity:0.85,
  })
  .bindTooltip((p.name || 'Unnamed') + '<br>' + LABELS[p.poi_type] + ' · ' + p.station)
  .on('click', () => showPopup(p))
  .addTo(grp);
}

// Station markers
const stationIcon = L.divIcon({
  className: '',
  html: '<span style="font-size:13px;font-weight:900;color:#ffd700;text-shadow:0 0 4px #000;' +
        'line-height:1;display:block;text-align:center;">✕</span>',
  iconSize:[14,14], iconAnchor:[7,7],
});
for (const s of STATIONS) {
  L.marker([s.lat, s.lng], {icon:stationIcon, zIndexOffset:1000})
   .bindTooltip('<b>' + s.name + '</b><br>Proposed Station')
   .addTo(map);
}

// Station list in sidebar
const listDiv = document.getElementById('station-list');
const sorted = Object.entries(SUMMARY).sort((a,b) => b[1].total - a[1].total);
for (const [name, cnt] of sorted) {
  const div = document.createElement('div');
  div.style.cssText = 'display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #21262d;';
  div.innerHTML = `<span>${name}</span><span style="color:#e6edf3;font-weight:600">${cnt.total}</span>`;
  listDiv.appendChild(div);
}

// Popup
function showPopup(p) {
  document.getElementById('pname').textContent   = p.name || 'Unnamed Establishment';
  document.getElementById('pi-type').textContent = LABELS[p.poi_type] || p.poi_type;
  document.getElementById('pi-sta').textContent  = p.station;
  const pop = document.getElementById('popup');
  pop.classList.remove('show'); void pop.offsetWidth; pop.classList.add('show');
}
function closePopup() { document.getElementById('popup').classList.remove('show'); }

// Filter
function onFilter() {
  const showFood   = document.getElementById('cb-food').checked;
  const showRetail = document.getElementById('cb-retail').checked;
  if (showFood)   map.addLayer(foodGroup);   else map.removeLayer(foodGroup);
  if (showRetail) map.addLayer(retailGroup); else map.removeLayer(retailGroup);
  updateStats();
}
function setAll(state) {
  document.getElementById('cb-food').checked   = state;
  document.getElementById('cb-retail').checked = state;
  onFilter();
}
function updateStats() {
  let count = 0;
  if (document.getElementById('cb-food').checked)   count += POIS.filter(p=>p.poi_type==='food').length;
  if (document.getElementById('cb-retail').checked) count += POIS.filter(p=>p.poi_type==='retail').length;
  document.getElementById('s-count').textContent = count.toLocaleString();
}
updateStats();
</script>
