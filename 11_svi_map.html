function showDetail(name,p){
  const svi=p.svi||RANKING.find(r=>r[0]===name)?.[1]?.svi;
  document.getElementById('det-name').textContent=name;
  document.getElementById('det-seg').textContent=(p.segment_type||p.segment||'');
  document.getElementById('d-svi').textContent=svi?Number(svi).toFixed(3):'—';
  document.getElementById('d-bar').style.width=svi?(svi*100)+'%':'0%';
  document.getElementById('detail').classList.add('show');
  document.querySelectorAll('.rank-item').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById('ri-'+name.replace(/[^a-z0-9]/gi,'_'));
  if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
}

function flyTo(name){
  const feat=STATIONS.features.find(f=>f.properties.station_name===name);
  if(feat) map.flyTo({center:feat.geometry.coordinates,zoom:13.5,duration:700});
  document.querySelectorAll('.rank-item').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById('ri-'+name.replace(/[^a-z0-9]/gi,'_'));
  if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
}
function closeDetail(){
  document.getElementById('detail').classList.remove('show');
  document.querySelectorAll('.rank-item').forEach(el=>el.classList.remove('active'));
}
function buildRanking(){
  const list=document.getElementById('rank-list');
  RANKING.forEach(([name,d],i)=>{
    const v=d.svi,c=v>=0.9?'#e31a1c':v>=0.75?'#fd8d3c':'#fed976';
    const div=document.createElement('div');
    div.className='rank-item';div.id='ri-'+name.replace(/[^a-z0-9]/gi,'_');
    div.innerHTML=`<div class="rank-num">${i+1}</div><div class="rank-name">${name}</div>
      <div class="rank-right"><div class="rank-bar-track">
        <div class="rank-bar-fill" style="width:${v*100}%;background:${c}"></div></div>
      <div class="rank-val">${v.toFixed(3)}</div></div>`;
    div.onclick=()=>{flyTo(name);showDetail(name,d);};
    list.appendChild(div);
  });
}
